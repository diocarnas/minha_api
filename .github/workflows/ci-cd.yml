name: CI/CD — Minha API

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  validar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validar OpenAPI com Spectral
        run: npx --yes @stoplight/spectral-cli@6 lint openapi.yaml

  publicar-docs:
    needs: validar
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Gerar HTML com Redoc
        run: |
          mkdir -p docs
          npx --yes @redocly/cli build-docs openapi.yaml --output docs/index.html

      - name: Publicar no GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs