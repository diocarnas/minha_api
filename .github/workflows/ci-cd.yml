name: CI/CD — Minha API

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  # ─── JOB 1: Validar o contrato ───
  validar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      # Ajustado para @v0 (versão oficial suportada pelo GitHub)
      - name: Validar OpenAPI com Action Oficial
        uses: stoplightio/spectral-action@v1
        with:
          file_glob: openapi.yaml

  # ─── JOB 2: Publicar documentação ───
  publicar-docs:
    needs: validar
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Gerar HTML com Redoc
        run: |
          mkdir -p docs
          npx --yes @redocly/cli build-docs openapi.yaml --output docs/index.html

      - name: Publicar no GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs